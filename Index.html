<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obiteljski Kronoložnik — Obitelj Milošević</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #212529;
      --grid-line: #dee2e6;
      --row-bg: #ffffff;
      --row-alt: #f1f3f5;
      --px-per-year: 18; /* default zoom */
      --row-height: 54px;
      --accent: #0d6efd;
      --radius: 6px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      padding: 1.2rem 2rem;
      background: #fff;
      border-bottom: 1px solid var(--grid-line);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    header h1 { margin: 0; font-size: 1.4rem; }
    header p { margin: 0; color: #6c757d; font-size: 0.9rem; }

    .controls {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      margin-left: auto;
    }
    button {
      padding: 0.4rem 0.7rem;
      border: 1px solid var(--grid-line);
      background: #fff;
      border-radius: var(--radius);
      cursor: pointer;
      font: inherit;
    }
    button:hover { background: #e9ecef; }
    button:active { background: #dee2e6; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      padding: 0.8rem 2rem;
      background: #fff;
      border-bottom: 1px solid var(--grid-line);
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
    }

    .timeline-wrapper {
      overflow-x: auto;
      padding: 1rem 0;
      background: var(--bg);
    }
    .timeline-container {
      position: relative;
      min-width: calc((2026 - 1929 + 1) * var(--px-per-year));
    }

    .year-grid {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--grid-line);
    }
    .year-tick {
      width: calc(var(--px-per-year) * 1px);
      min-width: var(--px-per-year) * 1px;
      border-right: 1px dashed var(--grid-line);
      font-size: 0.75rem;
      color: #6c757d;
      padding: 0.2rem 0 0.4rem;
      text-align: center;
    }

    .member-row {
      display: flex;
      height: var(--row-height);
      background: var(--row-bg);
      border-bottom: 1px solid var(--grid-line);
    }
    .member-row:nth-child(even) { background: var(--row-alt); }
    .member-label {
      width: 120px;
      min-width: 120px;
      padding: 0.6rem 0.8rem;
      font-weight: 600;
      background: #fff;
      border-right: 2px solid var(--grid-line);
      position: sticky;
      left: 0;
      z-index: 5;
    }
    .member-track {
      flex: 1;
      position: relative;
    }

    .event-marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .event-marker:hover { transform: translate(-50%, -50%) scale(1.4); }
    .event-marker[data-type="Rođenje"] { background: #20c997; }
    .event-marker[data-type="Vjenčanje"] { background: #fd7e14; }
    .event-marker[data-type="Rat / Kriza"] { background: #dc3545; }
    .event-marker[data-type="Prekretnica"] { background: #6f42c1; }
    .event-marker[data-type="Događaj"] { background: #0dcaf0; }
    .event-marker[data-type="Smrt"] { background: #495057; }

    .event-tooltip {
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: #343a40;
      color: #fff;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .event-marker:hover .event-tooltip { opacity: 1; }

    .note {
      padding: 1rem 2rem;
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      margin: 1rem 0 2rem;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .member-label { width: 90px; min-width: 90px; font-size: 0.85rem; }
      header, .legend, .note { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Obiteljski Kronoložnik</h1>
    <p>Paralelni prikaz · Obitelj Milošević · 1929–2026</p>
  </div>
  <div class="controls">
    <span style="font-size:0.85rem;color:#6c757d;">Zoom:</span>
    <button id="zoomOut">−</button>
    <button id="zoomIn">+</button>
    <button id="resetZoom">Reset</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><span class="dot" style="background:#20c997"></span> Rođenje</div>
  <div class="legend-item"><span class="dot" style="background:#fd7e14"></span> Vjenčanje</div>
  <div class="legend-item"><span class="dot" style="background:#dc3545"></span> Rat / Kriza</div>
  <div class="legend-item"><span class="dot" style="background:#6f42c1"></span> Prekretnica</div>
  <div class="legend-item"><span class="dot" style="background:#0dcaf0"></span> Događaj</div>
  <div class="legend-item"><span class="dot" style="background:#495057"></span> Smrt</div>
</div>

<div class="timeline-wrapper">
  <div class="timeline-container" id="timeline">
    <!-- Dynamic content injected by JS -->
  </div>
</div>

<div class="note">
  ⚠️ <strong>Napomena:</strong> Datum vjenčanja Drage i Vere još nije unesen (označen kao <code>~1955</code>). Dodaj pravi datum i ostale događaje kad budu poznati.
</div>

<script>
  // === DATA ===
  const CONFIG = {
    startYear: 1929,
    endYear: 2026,
    pxPerYear: 18
  };

  const members = ["Drago", "Vera", "Goranka", "Boris"];

  // Add/modify events here. Unknown dates can be left out or marked with `~` in title.
  const events = [
    { member: "Drago", year: 1929, type: "Rođenje", title: "Rođen" },
    { member: "Vera", year: 1931, type: "Rođenje", title: "Rođena" },
    { member: "Drago", year: 1955, type: "Vjenčanje", title: "Vjenčanje (~1955)" },
    { member: "Vera", year: 1955, type: "Vjenčanje", title: "Vjenčanje (~1955)" },
    { member: "Goranka", year: 1956, type: "Rođenje", title: "Rođena" },
    { member: "Boris", year: 1958, type: "Rođenje", title: "Rođen" }
    // 🔽 Add more events as you discover them
  ];

  // === RENDER ENGINE ===
  const timelineEl = document.getElementById("timeline");
  const zoomInBtn = document.getElementById("zoomIn");
  const zoomOutBtn = document.getElementById("zoomOut");
  const resetBtn = document.getElementById("resetZoom");

  function renderTimeline() {
    timelineEl.innerHTML = "";
    const years = CONFIG.endYear - CONFIG.startYear + 1;
    timelineEl.style.setProperty("--px-per-year", CONFIG.pxPerYear);
    timelineEl.style.minWidth = `${years * CONFIG.pxPerYear}px`;

    // Year grid
    const yearGrid = document.createElement("div");
    yearGrid.className = "year-grid";
    for (let y = CONFIG.startYear; y <= CONFIG.endYear; y++) {
      const tick = document.createElement("div");
      tick.className = "year-tick";
      tick.textContent = y % 10 === 0 ? y : ""; // show label every 10 years
      yearGrid.appendChild(tick);
    }
    timelineEl.appendChild(yearGrid);

    // Member rows
    members.forEach((m, idx) => {
      const row = document.createElement("div");
      row.className = "member-row";

      const label = document.createElement("div");
      label.className = "member-label";
      label.textContent = m;

      const track = document.createElement("div");
      track.className = "member-track";

      // Place events
      const memberEvents = events.filter(e => e.member === m);
      memberEvents.forEach(ev => {
        if (ev.year < CONFIG.startYear || ev.year > CONFIG.endYear) return;
        const marker = document.createElement("div");
        marker.className = "event-marker";
        marker.dataset.type = ev.type;
        const leftPos = (ev.year - CONFIG.startYear) * CONFIG.pxPerYear + (CONFIG.pxPerYear / 2);
        marker.style.left = `${leftPos}px`;

        const tooltip = document.createElement("div");
        tooltip.className = "event-tooltip";
        tooltip.textContent = `${ev.year}: ${ev.title}`;
        marker.appendChild(tooltip);

        track.appendChild(marker);
      });

      row.appendChild(label);
      row.appendChild(track);
      timelineEl.appendChild(row);
    });
  }

  // === CONTROLS ===
  zoomInBtn.addEventListener("click", () => {
    CONFIG.pxPerYear = Math.min(60, CONFIG.pxPerYear + 4);
    renderTimeline();
  });

  zoomOutBtn.addEventListener("click", () => {
    CONFIG.pxPerYear = Math.max(6, CONFIG.pxPerYear - 4);
    renderTimeline();
  });

  resetBtn.addEventListener("click", () => {
    CONFIG.pxPerYear = 18;
    renderTimeline();
  });

  // Initial render
  renderTimeline();
</script>

</body>
</html>
